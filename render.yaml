# Unique service names avoid collisions with other public Render apps
# Expected URLs after deploy:
#   API:  https://katkuri-ems-api.onrender.com
#   Web:  https://katkuri-ems-web.onrender.com
services:
  - type: web
    name: katkuri-ems-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      # Set to: https://katkuri-ems-web.onrender.com
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: katkuri-ems-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Set to: https://katkuri-ems-api.onrender.com/api
      - key: NEXT_PUBLIC_API_URL
        sync: false
